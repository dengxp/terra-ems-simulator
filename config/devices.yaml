mqtt:
  broker: localhost
  port: 1883
  username: ''
  password: ''
devices:
- name: 生产车间总电表
  protocol: mqtt
  gateway_id: GW-001
  device_id: MTR-ACR220-001
  device_type: meter
  interval: 15
  points:
  - code: HW-E-001
    name: 车间总表正向有功电能
    type: accumulate
    base_value: 856230.0
    hourly_increment:
    - 80.0
    - 350.0
    pattern: industrial
  - code: HW-E-002
    name: 车间总表A相电压
    type: instant
    range:
    - 218.0
    - 228.0
    pattern: constant
  - code: HW-E-003
    name: 车间总表B相电压
    type: instant
    range:
    - 219.0
    - 227.0
    pattern: constant
  - code: HW-E-004
    name: 车间总表C相电压
    type: instant
    range:
    - 217.0
    - 226.0
    pattern: constant
  - code: HW-E-005
    name: 车间总表A相电流
    type: instant
    range:
    - 80.0
    - 320.0
    pattern: industrial
  - code: HW-E-006
    name: 车间总表有功功率
    type: instant
    range:
    - 50.0
    - 230.0
    pattern: industrial
  - code: HW-E-007
    name: 车间总表功率因数
    type: instant
    range:
    - 0.82
    - 0.95
    pattern: constant
- name: 生产车间水表
