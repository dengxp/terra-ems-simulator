# ============================================================
# Modbus TCP 设备（模拟器启动 Modbus 从站，Collector 主动轮询）
# ============================================================
- name: 高压进线总表
  protocol: modbus_tcp
  gateway_id: GW-PDR
  device_id: MTR-PD194-001
  device_type: meter
  host: "0.0.0.0"
  port: 5020
  slave_id: 1
  interval: 15
  registers:
    - point_code: HW-E-050
      name: 全厂总有功电能
      address: 0
      data_type: float32
      scale: 1.0
      offset: 0.0
      type: accumulate
      base_value: 3500000.0
      hourly_increment: [150.0, 600.0]
      pattern: industrial
    - point_code: HW-E-051
      name: 全厂总有功功率
      address: 2
      data_type: float32
      scale: 1.0
      offset: 0.0
      type: instant
      range: [100.0, 450.0]
      pattern: industrial
    - point_code: HW-E-052
      name: 高压进线A相电压
      address: 4
      data_type: float32
      scale: 1.0
      offset: 0.0
      type: instant
      range: [218.0, 228.0]
      pattern: constant
    - point_code: HW-E-053
      name: 高压进线功率因数
      address: 6
      data_type: float32
      scale: 1.0
      offset: 0.0
      type: instant
      range: [0.85, 0.96]
      pattern: constant
